<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Returning to Ranch Expense Tracker</title>
</head>
<body>
  <p>Returning to Ranch Expense Tracker…</p>
  <script>
    const firstPathSegment = location.pathname.split('/').filter(Boolean)[0];
    const target = firstPathSegment ? `/${firstPathSegment}/` : '/';
    location.replace(target);
  </script>
</body>
</html>
